apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kantin-ingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5000
      - path: / # sisa request utama diarahkan ke frontend
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
